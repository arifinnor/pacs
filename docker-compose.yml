services:
  auth-service:
    build: ./auth-service
    container_name: pacs-auth-service
    # Port 8000 is internal only — accessed through nginx
    environment:
      - DATABASE_URL=postgresql://orthanc:${DB_PASSWORD}@postgres:5432/orthanc
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=http://localhost:3000,https://localhost
      - PORT=8000
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build: ./web
    container_name: pacs-web
    environment:
      - ORTHANC_INTERNAL_URL=http://orthanc:8042
      - ORTHANC_USERNAME=admin
      - ORTHANC_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_SERVICE_URL=http://auth-service:8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - NODE_ENV=production
    depends_on:
      orthanc:
        condition: service_started
      auth-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/app/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    command: >
      /bin/sh -c "
        export NGINX_ORTHANC_AUTH=$$(printf 'admin:%s' \"$$ADMIN_PASSWORD\" | base64) &&
        envsubst '$$NGINX_ORTHANC_AUTH' < /etc/nginx/nginx.conf.template > /tmp/nginx.conf &&
        mv /tmp/nginx.conf /etc/nginx/nginx.conf &&
        nginx -t &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ./orthanc/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./orthanc/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      orthanc:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ohif:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-network

  ohif:
    image: ohif/app:v3.10.2
    container_name: ohif-viewer
    # No external ports — accessed only through nginx
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js
    entrypoint: ["/bin/sh", "-c", "sed -i 's|=\"/viewer/|=\"/|g' /usr/share/nginx/html/index.html && sed -i 's|=\"/|=\"/viewer/|g' /usr/share/nginx/html/index.html && sed -i \"s|PUBLIC_URL = '/viewer/'|PUBLIC_URL = '/'|g\" /usr/share/nginx/html/index.html && sed -i \"s|PUBLIC_URL = '/'|PUBLIC_URL = '/viewer/'|g\" /usr/share/nginx/html/index.html && /usr/src/entrypoint.sh nginx -g 'daemon off;'"]
    restart: unless-stopped
    networks:
      - pacs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  orthanc:
    image: orthancteam/orthanc:26.1.0
    container_name: orthanc-dev
    ports:
      - "4242:4242"   # DICOM protocol (exposed for modalities)
      # Port 8042 is now internal only - accessed through nginx
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-storage:/var/lib/orthanc/db
    environment:
      - ORTHANC__DICOM_AET=ORTHANC
      - ORTHANC__DICOM_PORT=4242
      - ORTHANC__HTTP_PORT=8042
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=true
      - ORTHANC__REGISTERED_USERS={"admin":"${ADMIN_PASSWORD}"}
      - ORTHANC__DICOM_WEB__ENABLE=true
      - ORTHANC__DICOM_WEB__ROOT=/dicom-web/
      - ORTHANC__DICOM_WEB__ENABLE_WADO=true
      - ORTHANC__DICOM_WEB__WADO_ROOT=/wado
      - ORTHANC__DICOM_WEB__QIDO_CASE_SENSITIVE=false

      # --- Orthanc Explorer 2 ---
      - ORTHANC__ORTHANC_EXPLORER_2__ENABLE=true
      - ORTHANC__ORTHANC_EXPLORER_2__IS_DEFAULT_ORTHANC_UI=true

      # --- PostgreSQL ---
      - ORTHANC__POSTGRESQL__HOST=postgres
      - ORTHANC__POSTGRESQL__PORT=5432
      - ORTHANC__POSTGRESQL__DATABASE=orthanc
      - ORTHANC__POSTGRESQL__USERNAME=orthanc
      - ORTHANC__POSTGRESQL__PASSWORD=${DB_PASSWORD}
      - ORTHANC__POSTGRESQL__ENABLE_INDEX=true
      - ORTHANC__POSTGRESQL__ENABLE_STORAGE=false
      - ORTHANC__POSTGRESQL__INDEX_CONNECTIONS_COUNT=10

      # --- Authorization (JWT) ---
      # JWT validation is handled by nginx auth_request → auth-service
      # The Orthanc authorization plugin config is removed from orthanc.json
      # so the plugin loads but has no validation URL (no-op)
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1', 8042)); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15.8
    container_name: orthanc-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=orthanc
      - POSTGRES_USER=orthanc
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pacs-network

volumes:
  orthanc-storage:
  postgres-data:

networks:
  pacs-network:
    driver: bridge
